<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#18181b">
<title>选号助手 — 数据分析工具</title>
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Hiragino Sans GB',sans-serif;background:#f4f4f2;color:#18181b;min-height:100dvh}
.app{max-width:480px;margin:0 auto;padding:0 0 80px}

/* Nav */
.nav{background:#fff;border-bottom:1px solid #e8e8e4;padding:14px 16px 12px;position:sticky;top:0;z-index:10}
.nav-title{font-size:16px;font-weight:600;letter-spacing:-0.3px}
.nav-sub{font-size:10px;color:#a0a09a;margin-top:1px}

/* Bottom tab bar */
.tabbar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e8e8e4;display:flex;z-index:20;padding-bottom:env(safe-area-inset-bottom)}
.tabbar-btn{flex:1;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;cursor:pointer;color:#a0a09a;font-size:10px;transition:color .15s}
.tabbar-btn.active{color:#18181b}
.tab-icon{width:22px;height:22px;display:flex;align-items:center;justify-content:center}

/* Pages */
.page{display:none;padding:16px}
.page.active{display:block}

/* Type toggle */
.type-toggle{display:flex;gap:8px;margin-bottom:16px;background:#e8e8e4;padding:3px;border-radius:12px}
.type-btn{flex:1;padding:9px;border:none;border-radius:9px;font-size:13px;font-weight:500;cursor:pointer;background:none;color:#6b6b66;transition:all .2s}
.type-btn.active{background:#fff;color:#18181b;box-shadow:0 1px 3px rgba(0,0,0,.1)}

/* Cards */
.card{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:10px}
.card-label{font-size:10px;font-weight:600;color:#a0a09a;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}

/* Slider */
.slider-group{margin-bottom:12px}
.slider-row{display:flex;align-items:center;gap:10px;margin-top:4px}
.slider-row input[type=range]{flex:1;height:3px;-webkit-appearance:none;appearance:none;background:#e8e8e4;border-radius:2px;outline:none}
.slider-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#18181b;cursor:pointer}
.slider-lbl{display:flex;justify-content:space-between;align-items:center}
.slider-lbl span:first-child{font-size:12px;color:#6b6b66}
.slider-val{font-size:12px;font-weight:600;color:#18181b;background:#f4f4f2;padding:2px 8px;border-radius:6px}

/* Grid */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mini-card{background:#f8f8f6;border-radius:10px;padding:10px 12px}
.mini-card .mini-label{font-size:10px;color:#a0a09a;margin-bottom:6px}
.num-row{display:flex;align-items:center;gap:6px}
.num-row input[type=number]{width:48px;padding:5px 4px;text-align:center;border:1px solid #e0e0dc;border-radius:8px;font-size:13px;background:#fff}
.num-row span{font-size:11px;color:#a0a09a}

/* Toggles */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid #f0f0ec}
.toggle-row:last-child{border-bottom:none}
.toggle-row label{font-size:13px;color:#4a4a46}
.sw{position:relative;width:36px;height:20px;cursor:pointer}
.sw input{opacity:0;width:0;height:0}
.sw-track{position:absolute;inset:0;background:#e0e0dc;border-radius:10px;transition:background .2s}
.sw input:checked + .sw-track{background:#18181b}
.sw-thumb{position:absolute;top:2px;left:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:transform .2s;pointer-events:none;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.sw input:checked ~ .sw-thumb{transform:translateX(16px)}

/* Count buttons */
.count-row{display:flex;gap:6px}
.cnt-btn{flex:1;padding:8px 4px;border:1px solid #e0e0dc;border-radius:9px;background:#fff;font-size:12px;font-weight:500;color:#6b6b66;cursor:pointer;transition:all .15s}
.cnt-btn.active{background:#18181b;color:#fff;border-color:#18181b}

/* Generate button */
.gen-btn{width:100%;padding:15px;background:#18181b;color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .15s;margin-top:4px}
.gen-btn:disabled{opacity:.4}
.gen-btn:active{opacity:.8}

/* Results */
.results-header{display:flex;justify-content:space-between;align-items:center;margin:18px 0 10px}
.results-title{font-size:12px;font-weight:600;color:#a0a09a;text-transform:uppercase;letter-spacing:.06em}
.sort-pills{display:flex;gap:4px}
.sort-pill{font-size:10px;padding:3px 9px;border:1px solid #e0e0dc;border-radius:20px;background:#fff;cursor:pointer;color:#6b6b66;transition:all .1s}
.sort-pill.active{background:#18181b;color:#fff;border-color:#18181b}

/* Result card */
.result-card{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:8px;cursor:pointer;border:1.5px solid transparent;transition:border-color .15s}
.result-card:active{background:#fafaf8}
.result-card.saved{border-color:#10a37f}
.balls{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.ball{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600}
.ball.r{background:#FEF2F2;color:#7F1D1D;border:1px solid #FECACA}
.ball.b{background:#EFF6FF;color:#1E3A5F;border:1px solid #BFDBFE}
.ball.sep{width:12px;font-size:16px;color:#d0d0cc}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px;align-items:center}
.tag{font-size:10px;padding:2px 8px;border-radius:20px}
.tag.hot{background:#FFF7ED;color:#92400E}
.tag.cold{background:#EFF6FF;color:#1E3A5F}
.tag.sum{background:#F5F3FF;color:#4C1D95}
.tag.score{background:#F0FDF4;color:#14532D}
.tag.score.mid{background:#FFFBEB;color:#78350F}
.tag.score.low{background:#F9FAFB;color:#6B7280}
.save-btn{margin-left:auto;font-size:10px;padding:3px 10px;border:1px solid #e0e0dc;border-radius:20px;background:none;cursor:pointer;color:#6b6b66;transition:all .1s}
.save-btn.saved{background:#ECFDF5;color:#065F46;border-color:#6EE7B7}
.reasons{margin-top:10px;padding-top:10px;border-top:1px solid #f0f0ec;display:none}
.reasons.open{display:block}
.reason{font-size:11px;color:#6b6b66;padding:2px 0}

/* Error */
.error-box{background:#FEF2F2;border:1px solid #FECACA;border-radius:10px;padding:12px;margin-top:10px;font-size:13px;color:#991B1B}

/* Analysis */
.hot-grid{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.hot-ball{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;cursor:pointer;transition:transform .1s}
.hot-ball:active{transform:scale(.9)}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.stat-item{background:#f8f8f6;border-radius:10px;padding:12px}
.stat-val{font-size:20px;font-weight:700;color:#18181b}
.stat-lbl{font-size:10px;color:#a0a09a;margin-top:2px}

/* History */
.hist-card{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:8px}
.hist-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.hist-date{font-size:11px;color:#a0a09a}
.hist-hit{font-size:10px;padding:2px 8px;border-radius:20px}

/* Spinner */
.spin{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Empty */
.empty{text-align:center;padding:48px 20px;color:#a0a09a}
.empty .big{font-size:48px;margin-bottom:12px}
.empty p{font-size:14px}
.empty small{font-size:12px;margin-top:4px;display:block}

/* Disclaimer */
.disclaimer{text-align:center;font-size:10px;color:#c0c0bc;margin-top:20px;padding:12px;background:#fff;border-radius:10px}

/* Bar chart */
.bar-chart{margin-top:12px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.bar-lbl{font-size:9px;color:#a0a09a;width:52px;text-align:right;flex-shrink:0}
.bar-track{flex:1;height:14px;background:#f0f0ec;border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;background:#18181b;transition:width .6s ease}
.bar-cnt{font-size:9px;color:#a0a09a;width:18px}
</style>
</head>
<body>
<div class="app">
  <div class="nav">
    <div class="nav-title">选号助手</div>
    <div class="nav-sub">数据分析工具 · 娱乐参考</div>
  </div>

  <!-- Page: Generate -->
  <div class="page active" id="page-gen">
    <div style="padding-top:12px">
      <div class="type-toggle">
        <button class="type-btn active" onclick="setType('ssq',this)">双色球</button>
        <button class="type-btn" onclick="setType('dlt',this)">大乐透</button>
      </div>

      <div class="card">
        <div class="card-label">冷热号策略</div>
        <div class="slider-group">
          <div class="slider-lbl"><span>热号偏向比例</span><span class="slider-val" id="hot-val">热号 60%</span></div>
          <div class="slider-row">
            <span style="font-size:10px;color:#a0a09a">冷</span>
            <input type="range" id="hot-ratio" min="0" max="100" value="60" oninput="updateHot(this.value)">
            <span style="font-size:10px;color:#a0a09a">热</span>
          </div>
        </div>
        <div class="slider-group" style="margin-bottom:0">
          <div class="slider-lbl"><span>统计窗口</span><span class="slider-val" id="win-val">30 期</span></div>
          <div class="slider-row">
            <input type="range" id="hot-window" min="10" max="100" step="5" value="30" oninput="document.getElementById('win-val').textContent=this.value+' 期'">
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-label">结构过滤</div>
        <div class="grid2">
          <div class="mini-card">
            <div class="mini-label">奇偶比</div>
            <div class="num-row">
              <input type="number" id="odd-n" value="3" min="0" max="6">
              <span>奇:</span>
              <input type="number" id="even-n" value="3" min="0" max="6">
              <span>偶</span>
            </div>
          </div>
          <div class="mini-card">
            <div class="mini-label">和值范围</div>
            <div class="num-row">
              <input type="number" id="sum-min" value="60" min="1" max="250" style="width:44px">
              <span>~</span>
              <input type="number" id="sum-max" value="120" min="1" max="250" style="width:44px">
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-label">形态选项</div>
        <div class="toggle-row">
          <label>包含连号</label>
          <label class="sw"><input type="checkbox" id="chk-consec"><div class="sw-track"></div><div class="sw-thumb"></div></label>
        </div>
        <div class="toggle-row">
          <label>包含同尾号</label>
          <label class="sw"><input type="checkbox" id="chk-tail"><div class="sw-track"></div><div class="sw-thumb"></div></label>
        </div>
      </div>

      <div class="card">
        <div class="card-label">生成注数</div>
        <div class="count-row">
          <button class="cnt-btn active" onclick="setCount(3,this)">3注</button>
          <button class="cnt-btn" onclick="setCount(5,this)">5注</button>
          <button class="cnt-btn" onclick="setCount(8,this)">8注</button>
          <button class="cnt-btn" onclick="setCount(10,this)">10注</button>
          <button class="cnt-btn" onclick="setCount(15,this)">15注</button>
        </div>
      </div>

      <button class="gen-btn" id="gen-btn" onclick="doGenerate()">
        <span id="gen-txt">生成推荐号码</span>
      </button>
      <div id="error-area"></div>

      <div id="results-wrap" style="display:none">
        <div class="results-header">
          <span class="results-title" id="res-count">推荐 0 注</span>
          <div class="sort-pills">
            <button class="sort-pill active" onclick="sortBy('score',this)">评分</button>
            <button class="sort-pill" onclick="sortBy('sum',this)">和值</button>
            <button class="sort-pill" onclick="sortBy('hot',this)">热号</button>
          </div>
        </div>
        <div id="results-list"></div>
        <div class="disclaimer">娱乐分析工具 · 彩票有风险 · 理性参与 · 量力而行</div>
      </div>
    </div>
  </div>

  <!-- Page: Analysis -->
  <div class="page" id="page-analysis">
    <div style="padding-top:12px">
      <div class="card">
        <div class="card-label">双色球红球热号 TOP 14（近30期）</div>
        <div class="hot-grid" id="hot-grid"></div>
      </div>
      <div class="stat-grid" id="stat-grid"></div>
      <div class="card" style="margin-top:10px">
        <div class="card-label">和值分布（近100期）</div>
        <div class="bar-chart" id="sum-bars"></div>
      </div>
    </div>
  </div>

  <!-- Page: History -->
  <div class="page" id="page-hist">
    <div style="padding-top:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <span style="font-size:15px;font-weight:600">我的记录</span>
        <span id="hist-count" style="font-size:11px;color:#a0a09a"></span>
      </div>
      <div id="hist-list"></div>
    </div>
  </div>
</div>

<!-- Bottom Tab Bar -->
<div class="tabbar">
  <button class="tabbar-btn active" onclick="switchTab('gen',this)" id="tab-gen-btn">
    <div class="tab-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>
    </div>
    生成
  </button>
  <button class="tabbar-btn" onclick="switchTab('analysis',this)" id="tab-analysis-btn">
    <div class="tab-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    </div>
    分析
  </button>
  <button class="tabbar-btn" onclick="switchTab('hist',this)" id="tab-hist-btn">
    <div class="tab-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    </div>
    记录
  </button>
</div>

        ],
        sumRange: [
          parseInt(document.getElementById('sum-min').value),
          parseInt(document.getElementById('sum-max').value)
        ],
        includeConsecutive: document.getElementById('chk-consec').checked,
        includeSameTail: document.getElementById('chk-tail').checked,
        mustInclude: [], mustExclude: []
      };

      var history = buildHistory(currentType, 100);
      var result = window.LotteryEngine.generateNumbers(history, strategy, generateCount);

      lastResults = result.sets;
      document.getElementById('results-wrap').style.display = '';
      document.getElementById('res-count').textContent = '推荐 ' + result.sets.length + ' 注 · ' + result.analysisUsed.periods + '期数据';
      renderResults(lastResults);
    } catch(e) {
      document.getElementById('error-area').innerHTML =
        '<div class="error-box">生成失败：' + (e.message || '请重试') + '</div>';
    }
    btn.disabled = false;
    txt.textContent = '生成推荐号码';
  }, 600);
}

// ── Render results ──
function renderResults(sets) {
  var list = document.getElementById('results-list');
  list.innerHTML = sets.map(function(s, i) {
    var isSaved = savedIds.has(s.id);
    var balls = s.numbers.map(function(n) {
      return '<div class="ball r">' + pad(n) + '</div>';
    }).join('');
    var bonus = s.bonus.map(function(n) {
      return '<div class="ball b">' + pad(n) + '</div>';
    }).join('');
    var sc = s.score >= 70 ? 'score' : s.score >= 50 ? 'score mid' : 'score low';
    var tags = '';
    if (s.stats.hotCount > 0) tags += '<span class="tag hot">' + s.stats.hotCount + '热</span>';
    if (s.stats.coldCount > 0) tags += '<span class="tag cold">' + s.stats.coldCount + '冷</span>';
    tags += '<span class="tag sum">和 ' + s.stats.sum + '</span>';
    tags += '<span class="tag ' + sc + '">评分 ' + s.score + '</span>';
    var reasons = s.reasons.map(function(r) {
      return '<div class="reason">· ' + r + '</div>';
    }).join('');
    return '<div class="result-card' + (isSaved ? ' saved' : '') + '" id="rc-' + s.id + '" onclick="toggleCard(event,\'' + s.id + '\',' + i + ')">' +
      '<div class="balls">' + balls + '<div class="ball sep">+</div>' + bonus + '</div>' +
      '<div class="tags">' + tags +
      '<button class="save-btn' + (isSaved ? ' saved' : '') + '" id="sbtn-' + s.id + '" onclick="toggleSave(event,\'' + s.id + '\',' + i + ')">' +
      (isSaved ? '已保存' : '保存') + '</button></div>' +
      '<div class="reasons" id="rl-' + s.id + '">' + reasons + '</div></div>';
  }).join('');
}

function toggleCard(e, id, idx) {
  if (e.target.classList.contains('save-btn')) return;
  var el = document.getElementById('rl-' + id);
  if (el) el.classList.toggle('open');
}

function toggleSave(e, id, idx) {
  e.stopPropagation();
  var s = lastResults[idx];
  var btn = document.getElementById('sbtn-' + id);
  var card = document.getElementById('rc-' + id);
  if (savedIds.has(id)) {
    savedIds.delete(id);
    btn.textContent = '保存'; btn.classList.remove('saved');
    card.classList.remove('saved');
    historyRecords = historyRecords.filter(function(h){return h.id !== id;});
  } else {
    savedIds.add(id);
    btn.textContent = '已保存'; btn.classList.add('saved');
    card.classList.add('saved');
    var now = new Date();
    historyRecords.unshift(Object.assign({}, s, {
      savedAt: now.toLocaleDateString('zh-CN') + ' ' + now.toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'})
    }));
  }
}

function sortBy(field, btn) {
  document.querySelectorAll('.sort-pill').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  var sorted = lastResults.slice();
  if (field === 'score') sorted.sort(function(a,b){return b.score - a.score;});
  else if (field === 'sum') sorted.sort(function(a,b){return a.stats.sum - b.stats.sum;});
  else if (field === 'hot') sorted.sort(function(a,b){return b.stats.hotCount - a.stats.hotCount;});
  renderResults(sorted);
}

// ── Analysis ──
function buildAnalysis() {
  var history = buildHistory('ssq', 100);
  var analysis = window.LotteryEngine.analyzeHistory(history, 'ssq', 30);

  // Hot balls
  var sorted = analysis.numberStats.slice().sort(function(a,b){return b.frequency-a.frequency;}).slice(0,14);
  var maxFreq = sorted[0].frequency;
  var grid = document.getElementById('hot-grid');
  grid.innerHTML = sorted.map(function(s) {
    var heat = s.frequency / maxFreq;
    var r = Math.round(240 - heat * 80);
    var g = Math.round(240 - heat * 150);
    var b2 = Math.round(240 - heat * 150);
    var tr = Math.round(180 - heat * 100);
    var tg = Math.round(100 - heat * 60);
    var tb = Math.round(100 - heat * 60);
    return '<div class="hot-ball" style="background:rgb('+r+','+g+','+b2+');color:rgb('+tr+','+tg+','+tb+');border:1px solid rgba('+tr+','+tg+','+tb+',.3)">' + pad(s.number) + '</div>';
  }).join('');

  // Stats
  var sums = history.map(function(r){return r.numbers.reduce(function(a,b){return a+b;},0);});
  var avgSum = (sums.reduce(function(a,b){return a+b;},0) / sums.length).toFixed(1);
  var odds = history.map(function(r){return r.numbers.filter(function(n){return n%2!==0;}).length;});
  var avgOdd = (odds.reduce(function(a,b){return a+b;},0) / odds.length).toFixed(1);

  var consecCount = history.filter(function(r){
    var s = r.numbers;
    return s.some(function(_,i){return i>0 && s[i]-s[i-1]===1;});
  }).length;
  var tailCount = history.filter(function(r){
    var tails = r.numbers.map(function(n){return n%10;});
    return tails.some(function(t,i){return tails.indexOf(t)!==i;});
  }).length;

  document.getElementById('stat-grid').innerHTML = [
    {val: avgSum, lbl: '平均和值', sub: '近100期'},
    {val: avgOdd, lbl: '平均奇数个数', sub: '趋向3:3平衡'},
    {val: (consecCount/history.length*100).toFixed(1)+'%', lbl: '连号出现频率', sub: '近100期'},
    {val: (tailCount/history.length*100).toFixed(1)+'%', lbl: '同尾号出现频率', sub: '近100期'}
  ].map(function(d){
    return '<div class="stat-item"><div class="stat-val">'+d.val+'</div><div class="stat-lbl">'+d.lbl+'</div><div style="font-size:9px;color:#c0c0bc;margin-top:1px">'+d.sub+'</div></div>';
  }).join('');

  // Sum distribution bar chart
  var bins = new Array(14).fill(0);
  sums.forEach(function(s) {
    var i = Math.max(0, Math.min(13, Math.floor((s - 30) / 15)));
    bins[i]++;
  });
  var maxBin = Math.max.apply(null, bins);
  document.getElementById('sum-bars').innerHTML = bins.map(function(cnt, i) {
    var label = (30 + i*15) + '~' + (45 + i*15);
    var pct = maxBin > 0 ? Math.round(cnt / maxBin * 100) : 0;
    return '<div class="bar-row"><span class="bar-lbl">'+label+'</span>' +
      '<div class="bar-track"><div class="bar-fill" style="width:'+pct+'%"></div></div>' +
      '<span class="bar-cnt">'+cnt+'</span></div>';
  }).join('');
}

// ── History ──
function renderHistory() {
  var cnt = document.getElementById('hist-count');
  var list = document.getElementById('hist-list');
  cnt.textContent = historyRecords.length + ' 条记录';
  if (historyRecords.length === 0) {
    list.innerHTML = '<div class="empty"><div class="big">🎱</div><p>暂无保存记录</p><small>在生成页面保存号码后显示</small></div>';
    return;
  }
  list.innerHTML = historyRecords.map(function(r) {
    var balls = r.numbers.map(function(n){return '<div class="ball r" style="width:30px;height:30px;font-size:11px">'+pad(n)+'</div>';}).join('');
    var bonus = r.bonus.map(function(n){return '<div class="ball b" style="width:30px;height:30px;font-size:11px">'+pad(n)+'</div>';}).join('');
    return '<div class="hist-card">' +
      '<div class="hist-meta"><span class="hist-date">'+r.savedAt+'</span>' +
      '<span class="hist-hit" style="background:#F0FDF4;color:#065F46">评分 '+r.score+'</span></div>' +
      '<div class="balls">'+balls+'<div class="ball sep">+</div>'+bonus+'</div></div>';
  }).join('');
}

// ── Utils ──
function pad(n) { return String(n).padStart(2,'0'); }
</script>
